
       
<!DOCTYPE html>
<html lang="">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Title Page</title>

        <!-- Bootstrap CSS -->
        <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">

        
        <div class="container mt-4">
            <div class="panel panel-success  ">
                <div class="panel-heading">
                    <h4 class="text-center">modifier un  client</h4>
                </div>
                    <div class="panel-body">
                        
                        <form action="{% url 'modifier_client' client.id  %}" method="POST" role="form">
                            {% csrf_token %}
                        
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="form-group">
                                        <label for="nom">Nom</label>
                                        <input type="text" value="{{client.nom}}" class="form-control" id="nom"  name="nom" placeholder="veuillez entrer un nom" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="prenom">Prenom</label>
                                        <input type="text" value="{{client.prenom}}" class="form-control" id="prenom"  name="prenom"placeholder="veuillez entrer un prenom">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="form-group">
                                        <label for="numero">Numero</label>
                                        <input type="text" value="{{client.numero}}" class="form-control" id="numero"  name="numero"placeholder="veuillez entrer un numero">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="email">Email</label>
                                        <input type="email" value="{{client.email}}"  class="form-control" id="email"  name="email"placeholder="veuillez entrer un email">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <select class="form-select" name="sexe" aria-label="Default select example">
                                        <option value="">Selectionner</option>
            
                                        <option value="M"
                                            {% if client.sexe == "M" %}selected{% endif %}>
                                            M
                                        </option>
                                    
                                        <option value="Mme"
                                            {% if client.sexe == "Mme" %}selected{% endif %}>
                                            Mme
                                        </option>
                                        
                                    </select>
                                </div>
                            </div><br>
                            <button type="submit" class="btn btn-primary">enregistrer</button>
                        </form>
                        
                    </div>
                
            </div>
        </div>
        
    </head>
    <body>
        

        <!-- jQuery -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
        <!-- Bootstrap JavaScript -->
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    </body>
</html>

</div>
